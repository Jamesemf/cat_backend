name: API (AWS App Runner)

# Backend pipeline. Only fires for backend changes. Runs the pytest suite, then
# builds the image, pushes it to ECR, and triggers an App Runner deployment.
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'requirements.txt'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cats-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        working-directory: api
        run: python -m pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # allows upgrading to OIDC role auth later
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Keyless auth via GitHub OIDC — assumes the cats-github-actions role
      # (no long-lived AWS keys stored in the repo). Needs id-token: write above.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          LATEST="$REGISTRY/$ECR_REPOSITORY:latest"
          docker build -f api/Dockerfile -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Trigger App Runner deployment
        # start-deployment only works while the service is RUNNING. A service is
        # not RUNNING mid-deploy (OPERATION_IN_PROGRESS) — and pushing :latest
        # just above can kick off an automatic deployment — so a single call
        # races and fails ("isn't in RUNNING state"). Retry until the service
        # settles back to RUNNING and the call is accepted.
        run: |
          ARN="${{ secrets.APPRUNNER_SERVICE_ARN }}"
          for i in $(seq 1 24); do
            if aws apprunner start-deployment --service-arn "$ARN"; then
              echo "deployment started"; exit 0
            fi
            echo "service busy/not RUNNING — retry $i/24 in 20s"
            sleep 20
          done
          echo "could not start deployment after ~8 min" >&2; exit 1
